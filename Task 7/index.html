<!DOCTYPE html>
<html>

<head>
    <title>Task 7</title>

    <script>

    function demo()
    {
        alert("Welcome");

        var name = prompt("Enter your name");

        var choice = confirm("Continue?");

        if(choice)
        {
            alert("Welcome " + name);
        }
        else
        {
            alert("Thank You");
        }
    }

    </script>

</head>

<body>

<button onclick="demo()">Start</button>

</body>

</html>
